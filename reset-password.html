<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Keep Track — Reset Password</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg:#FAF7F2;
      --card:rgba(255,255,255,0.65);
      --text:#2A2118;
      --muted:#8D8074;
      --line:#E8DED1;
      --sand:#C4A882;
      --sand-deep:#9A7B4F;
      --good:#3A6B3A;
      --bad:#B85C5C;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
      background:
        radial-gradient(circle at top left, rgba(196,168,130,0.18) 0%, transparent 28%),
        radial-gradient(circle at bottom right, rgba(212,191,163,0.22) 0%, transparent 22%),
        linear-gradient(135deg,#B8CED4 0%, #D4E8E0 30%, #E8DCC8 60%, #F0E8D8 100%);
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }
    .card{
      width:100%;
      max-width:420px;
      background:var(--card);
      backdrop-filter:blur(22px);
      -webkit-backdrop-filter:blur(22px);
      border:1px solid rgba(255,255,255,.72);
      border-radius:28px;
      padding:28px 22px 22px;
      box-shadow:0 18px 50px rgba(86,74,57,.12), inset 0 1px 0 rgba(255,255,255,.75);
    }
    .logo{
      width:46px;height:46px;border-radius:14px;
      background:linear-gradient(135deg,#D7BFA1,#C4A882);
      display:flex;align-items:center;justify-content:center;
      margin:0 auto 14px;
      color:#fff;font-family:Georgia,serif;font-weight:700;font-size:18px;
      box-shadow:0 10px 22px rgba(164,132,90,.25);
    }
    h1{
      margin:0 0 6px;
      text-align:center;
      font-size:28px;
      letter-spacing:-.03em;
    }
    .sub{
      margin:0 auto 18px;
      max-width:320px;
      text-align:center;
      color:var(--muted);
      font-size:14px;
      line-height:1.55;
    }
    .msg{
      display:none;
      border-radius:14px;
      padding:12px 14px;
      font-size:13px;
      line-height:1.45;
      margin-bottom:14px;
      border:1px solid transparent;
    }
    .msg.show{display:block}
    .msg.info{background:rgba(255,255,255,.7); border-color:var(--line); color:#6D6054}
    .msg.good{background:rgba(240,253,244,.92); border-color:#CFE6CF; color:var(--good)}
    .msg.bad{background:rgba(255,240,238,.92); border-color:#F1C9C2; color:var(--bad)}
    .field{margin-bottom:12px}
    label{
      display:block;
      font-size:11px;
      font-weight:700;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:var(--muted);
      margin:0 0 6px;
    }
    input{
      width:100%;
      border:1.5px solid var(--line);
      background:rgba(255,255,255,.82);
      border-radius:14px;
      padding:14px 14px;
      font-size:16px;
      color:var(--text);
      outline:none;
    }
    input:focus{
      border-color:var(--sand);
      background:#fff;
    }
    input[disabled]{
      opacity:.65;
      cursor:not-allowed;
      background:rgba(255,255,255,.6);
    }
    .btn{
      width:100%;
      border:none;
      border-radius:14px;
      padding:14px;
      font-size:15px;
      font-weight:700;
      color:#fff;
      cursor:pointer;
      background:linear-gradient(135deg,var(--sand),var(--sand-deep));
      box-shadow:0 10px 22px rgba(164,132,90,.25);
      transition:.15s ease;
    }
    .btn:hover{transform:translateY(-1px)}
    .btn:disabled{opacity:.6; cursor:not-allowed; transform:none}
    .meta{
      margin-top:14px;
      text-align:center;
      font-size:12px;
      color:var(--muted);
      line-height:1.5;
    }
    .link{
      color:var(--sand-deep);
      text-decoration:none;
      font-weight:700;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">KT</div>
    <h1>Reset password</h1>
    <p class="sub">Set a new password for your Keep Track account.</p>

    <div id="msg" class="msg info show">Checking your reset link…</div>

    <form id="resetForm">
      <div class="field">
        <label for="pw1">New password</label>
        <input id="pw1" type="password" placeholder="At least 6 characters" autocomplete="new-password" disabled />
      </div>
      <div class="field">
        <label for="pw2">Confirm password</label>
        <input id="pw2" type="password" placeholder="Re-enter password" autocomplete="new-password" disabled />
      </div>
      <button id="submitBtn" class="btn" type="submit" disabled>Update password</button>
    </form>

    <div class="meta">
      After this works, go back to
      <a class="link" href="https://soweeden-dot.github.io/notion-widget/sofia-dashboard.html">Keep Track</a>
      and sign in with your new password.
    </div>
  </div>

  <script>
    const supabaseUrl = "https://yhkhyxvaoqxfulrushcj.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inloa2h5eHZhb3F4ZnVscnVzaGNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNjgxODAsImV4cCI6MjA5MDY0NDE4MH0.C_sAB2hdrJ6_F3S-v1triTO2Ks8oadyxQHkG6MHR0xk";
    const sb = supabase.createClient(supabaseUrl, supabaseKey);

    const msg = document.getElementById('msg');
    const form = document.getElementById('resetForm');
    const pw1 = document.getElementById('pw1');
    const pw2 = document.getElementById('pw2');
    const submitBtn = document.getElementById('submitBtn');

    let canReset = false;

    function setMsg(text, kind) {
      msg.className = 'msg show ' + kind;
      msg.textContent = text;
    }

    function setEnabled(on) {
      canReset = on;
      pw1.disabled = !on;
      pw2.disabled = !on;
      submitBtn.disabled = !on;
      if (on) pw1.focus();
    }

    async function tryEnableResetFromSession() {
      try {
        const { data, error } = await sb.auth.getSession();
        if (error) throw error;
        if (data.session) {
          setEnabled(true);
          setMsg('Reset link confirmed. Enter your new password below.', 'info');
          return true;
        }
      } catch (e) {}
      return false;
    }

    sb.auth.onAuthStateChange(async (event) => {
      if (event === 'PASSWORD_RECOVERY' || event === 'SIGNED_IN') {
        setEnabled(true);
        setMsg('Reset link confirmed. Enter your new password below.', 'info');
      }
    });

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      if (!canReset) return;

      const password = pw1.value;
      const confirmPassword = pw2.value;

      if (!password || !confirmPassword) {
        setMsg('Please fill in both password fields.', 'bad');
        return;
      }
      if (password.length < 6) {
        setMsg('Use a password that is at least 6 characters long.', 'bad');
        return;
      }
      if (password !== confirmPassword) {
        setMsg('Your passwords do not match.', 'bad');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Updating password…';

      const { error } = await sb.auth.updateUser({ password });

      if (error) {
        setMsg(error.message || 'Could not update your password. Try opening the reset email again.', 'bad');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Update password';
        return;
      }

      setMsg('Password updated successfully. You can go back and sign in now.', 'good');
      submitBtn.textContent = 'Password updated';
      pw1.disabled = true;
      pw2.disabled = true;
    });

    setTimeout(async function() {
      const ok = await tryEnableResetFromSession();
      if (!ok) {
        setMsg('This reset link is missing or expired. Open the newest password reset email and try again.', 'bad');
      }
    }, 700);
  </script>
</body>
</html>
